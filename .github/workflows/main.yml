name: CI/CD Pipeline for Flask App

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest test_app.py -v

      - name: Build Application
        run: |
          echo "Simulating application build steps (e.g. archiving dependencies or creating artifacts)."
          mkdir -p build
          cp -r *.py requirements.txt build/

  deploy_staging:
    name: Deploy to Staging
    needs: build_and_test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to AWS Staging
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_KEY }}
          script: |
            echo "Deploying branch 'staging' to the AWS Staging environment..."
            mkdir -p ~/flask-staging
            cd ~/flask-staging
            # We would pull the latest code or run Docker here in a full app

  deploy_production:
    name: Deploy to Production
    needs: build_and_test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to AWS Production
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_KEY }}
          script: |
            echo "Deploying Release Tag to the AWS PRODUCTION environment..."
            mkdir -p ~/flask-prod
            cd ~/flask-prod
            # We would deploy the production-ready code here
