name: CI/CD Pipeline for Flask App

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest test_app.py -v

      - name: Build Application
        run: |
          echo "Simulating application build steps (e.g. archiving dependencies or creating artifacts)."
          mkdir -p build
          cp -r *.py requirements.txt build/

  deploy_staging:
    name: Deploy to Staging
    needs: build_and_test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Simulate Staging Deployment
        run: |
          echo "Deploying branch 'staging' to the STAGING environment..."
          echo "Using token ending with: ...${DEPLOYMENT_TOKEN: -4}"
        env:
          DEPLOYMENT_TOKEN: ${{ secrets.DEPLOYMENT_TOKEN }}

  deploy_production:
    name: Deploy to Production
    needs: build_and_test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Simulate Production Deployment
        run: |
          echo "Deploying branch 'main' to the PRODUCTION environment..."
          echo "Using token ending with: ...${DEPLOYMENT_TOKEN: -4}"
        env:
          DEPLOYMENT_TOKEN: ${{ secrets.DEPLOYMENT_TOKEN }}
